<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Fede · Tu ring de productividad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --morado:#7B3FA0; --morado-o:#5E2E7D; --morado-s:#431F5A;
  --naranja:#FF7A3D; --naranja-o:#D85A20; --naranja-s:#A84214;
  --rosa:#E84C88; --rosa-o:#C43068; --rosa-s:#97244F;
  --turquesa:#45B8AC; --turquesa-o:#2E8B82; --turquesa-s:#1F6159;
  --sol:#FFD166; --sol-o:#E0A93C; --sol-s:#B8862A;
  --verde:#6BCB77; --verde-o:#4EA95A; --verde-s:#357A3F;
  --cielo:#A8D8EA; --cielo-soft:#DCF0F8;
  --texto:#3A2249; --gris:#8A7C93; --papel:#F5EFFA;
  --bosque-cielo:#C7E9E0; --bosque-prado:#A8D8B0; --bosque-sendero:#D8C08E;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--papel); color:var(--texto); min-height:100vh;}
.oculto{display:none !important;}

.btn{border:none; cursor:pointer; font-weight:700; font-size:15px; color:#fff; padding:13px 22px; border-radius:16px; transition:transform .08s,box-shadow .08s; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px;}
.btn:active{transform:translateY(4px);}
.btn-morado{background:var(--morado); border:3px solid var(--morado-o); box-shadow:0 6px 0 var(--morado-s);}
.btn-morado:active{box-shadow:0 2px 0 var(--morado-s);}
.btn-naranja{background:var(--naranja); border:3px solid var(--naranja-o); box-shadow:0 6px 0 var(--naranja-s);}
.btn-naranja:active{box-shadow:0 2px 0 var(--naranja-s);}
.btn-rosa{background:var(--rosa); border:3px solid var(--rosa-o); box-shadow:0 6px 0 var(--rosa-s);}
.btn-rosa:active{box-shadow:0 2px 0 var(--rosa-s);}
.btn-turquesa{background:var(--turquesa); border:3px solid var(--turquesa-o); box-shadow:0 6px 0 var(--turquesa-s);}
.btn-turquesa:active{box-shadow:0 2px 0 var(--turquesa-s);}
.btn-verde{background:var(--verde); border:3px solid var(--verde-o); box-shadow:0 6px 0 var(--verde-s);}
.btn-verde:active{box-shadow:0 2px 0 var(--verde-s);}
.btn-sm{padding:8px 14px; font-size:13px; border-radius:12px;}

input,select{font-family:inherit; font-size:15px; color:var(--texto); padding:12px 14px; border-radius:14px; border:3px solid var(--cielo); background:#fff; width:100%; outline:none;}
input:focus,select:focus{border-color:var(--morado);}
label{font-size:13px; font-weight:700; color:var(--morado); display:block; margin-bottom:6px;}

/* ===== LOGIN RING ===== */
#login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; background:var(--papel);}
.ring{background:#241A2E; border-radius:26px; padding:24px; border:5px solid #15101C; position:relative; width:100%; max-width:360px;}
.ring::before,.ring::after{content:""; position:absolute; left:20px; right:20px; height:4px; background:var(--rosa); border-radius:3px;}
.ring::before{top:12px; box-shadow:0 8px 0 var(--sol),0 16px 0 var(--turquesa);}
.ring::after{bottom:12px; box-shadow:0 -8px 0 var(--sol),0 -16px 0 var(--rosa);}
.ring-lado{position:absolute; top:20px; bottom:20px; width:4px; background:var(--rosa); border-radius:3px;}
.ring-lado.izq{left:12px; box-shadow:8px 0 0 var(--sol),16px 0 0 var(--turquesa);}
.ring-lado.der{right:12px; box-shadow:-8px 0 0 var(--sol),-16px 0 0 var(--turquesa);}
.poste{position:absolute; width:14px; height:14px; border-radius:50%; background:#8A7C93; border:3px solid #5F5464;}
.poste.tl{top:8px;left:8px;} .poste.tr{top:8px;right:8px;} .poste.bl{bottom:8px;left:8px;} .poste.br{bottom:8px;right:8px;}
.login-inner{background:var(--papel); border-radius:16px; padding:26px 22px; text-align:center; margin:20px 8px; border:3px solid var(--morado); box-shadow:0 6px 0 var(--morado-s); position:relative; z-index:2;}
.login-logo{width:110px; height:110px; margin:0 auto 10px;}
.login-logo img{width:100%; height:100%; object-fit:contain;}

/* ===== APP + BOSQUE ===== */
#app{max-width:420px; margin:0 auto; min-height:100vh; position:relative;}
.bosque-bg{position:fixed; inset:0; z-index:0; overflow:hidden; max-width:420px; margin:0 auto;}
.bosque-cielo{position:absolute; top:0; left:0; right:0; height:24%; background:var(--bosque-cielo);}
.bosque-sol{position:absolute; top:5%; left:12%; width:46px; height:46px; border-radius:50%; background:#FFE9A8;}
.bosque-prado{position:absolute; bottom:0; left:0; right:0; height:78%; background:var(--bosque-prado);}
.arbol{position:absolute;}
.arbol .tronco{width:11px; background:#8A5A3C; margin:0 auto; border-radius:3px;}
.arbol .copa{border-radius:50%; margin-bottom:-6px;}
.topbar{position:relative; z-index:3; background:var(--morado); border-radius:0 0 22px 22px; border:4px solid var(--morado-o); border-top:none; box-shadow:0 6px 0 var(--morado-s); padding:12px 16px; display:flex; align-items:center; gap:12px; margin-bottom:8px;}
.topbar .mini-logo{width:44px; height:44px; flex-shrink:0;}
.topbar .mini-logo img{width:100%; height:100%; object-fit:contain;}
.topbar h1{color:#fff; font-size:18px;}
.topbar p{color:var(--cielo-soft); font-size:11px;}
.topbar .salir{margin-left:auto;}

.layout{position:relative; z-index:2; display:flex; gap:12px; padding:8px 12px 24px;}
.camino{position:relative; width:64px; flex-shrink:0;}
.camino-linea{position:absolute; top:24px; bottom:24px; left:50%; width:26px; margin-left:-13px; background:var(--bosque-sendero); border-radius:14px; border:3px solid #C4A876;}
.estaciones{position:relative;}
.est{position:absolute; left:50%; transform:translateX(-50%); cursor:pointer;}
.est-dot{width:44px; height:44px; border-radius:13px; border:3px solid; display:flex; align-items:center; justify-content:center; font-size:19px; transition:transform .1s; color:#fff;}
.est:active .est-dot{transform:translateY(3px);}
.est-dot.activa{outline:4px solid rgba(255,255,255,.7); outline-offset:2px;}
#fede-avatar{position:absolute; left:50%; margin-left:-24px; width:48px; height:48px; transition:top .55s cubic-bezier(.34,1.4,.5,1); z-index:6;}
#fede-avatar img{width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 3px 2px rgba(67,31,90,.4));}

.contenido{flex:1; min-width:0;}
.seccion{display:none;}
.seccion.activa{display:block;}
.card{background:rgba(255,255,255,.95); border-radius:20px; padding:18px; margin-bottom:16px; border:3px solid var(--cielo); box-shadow:0 6px 0 var(--cielo-soft);}
.card h2{font-size:17px; color:var(--morado); margin-bottom:14px; display:flex; align-items:center; gap:8px;}

.kpis{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px;}
.kpi{background:rgba(255,255,255,.95); border-radius:16px; padding:12px; border:3px solid var(--cielo); box-shadow:0 5px 0 var(--cielo-soft); text-align:center;}
.kpi .num{font-size:26px; font-weight:700;}
.kpi .lab{font-size:11px; color:var(--gris); font-weight:700;}

.form-grid{display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:14px;}
.chart-box{background:var(--papel); border-radius:16px; padding:14px; margin-bottom:14px; border:3px solid var(--cielo-soft);}
.chart-box h3{font-size:13px; color:var(--morado); margin-bottom:8px; text-align:center;}

.tarea{background:var(--papel); border-radius:14px; padding:12px; margin-bottom:10px; border:3px solid var(--cielo-soft);}
.tarea .desc{font-weight:700; margin-bottom:6px;}
.tarea .meta{font-size:11px; color:var(--gris); display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px;}
.pill{padding:3px 9px; border-radius:9px; font-size:10px; font-weight:700; color:#fff;}
.pill-venc{background:var(--rosa);} .pill-hoy{background:var(--sol); color:var(--sol-s);}
.pill-tiempo{background:var(--turquesa);} .pill-comp{background:var(--verde);} .pill-urg{background:var(--naranja);}
.acciones{display:flex; gap:6px;}
.icon-btn{border:none; cursor:pointer; width:36px; height:36px; border-radius:11px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px;}
.ib-verde{background:var(--verde); box-shadow:0 3px 0 var(--verde-s);}
.ib-rosa{background:var(--rosa); box-shadow:0 3px 0 var(--rosa-s);}
.ib-naranja{background:var(--naranja); box-shadow:0 3px 0 var(--naranja-s);}
.icon-btn:active{transform:translateY(2px);}

.persona-row{background:var(--papel); border-radius:14px; padding:12px; margin-bottom:10px; border:3px solid var(--cielo-soft); display:flex; align-items:center; gap:10px;}
.persona-row .pnom{font-weight:700; flex:1;}
.persona-tipo{font-size:10px; padding:3px 9px; border-radius:9px; font-weight:700; color:#fff; background:var(--turquesa);}

/* ===== RING POMODORO ===== */
.ring-pomo{background:#241A2E; border-radius:22px; padding:22px; border:5px solid #15101C; position:relative; margin-bottom:16px;}
.ring-pomo::before,.ring-pomo::after{content:""; position:absolute; left:18px; right:18px; height:3px; background:var(--rosa); border-radius:2px;}
.ring-pomo::before{top:10px; box-shadow:0 7px 0 var(--sol),0 14px 0 var(--turquesa);}
.ring-pomo::after{bottom:10px; box-shadow:0 -7px 0 var(--sol),0 -14px 0 var(--turquesa);}
.pomo-inner{background:var(--papel); border-radius:16px; padding:20px; margin:24px 6px; border:3px solid var(--naranja); box-shadow:0 6px 0 var(--naranja-s); text-align:center; position:relative; z-index:2;}
.pomo-time{font-size:56px; font-weight:700; color:var(--naranja); margin:10px 0;}
.estados-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:8px;}
.est-btn{border:none; cursor:pointer; font-size:12px; font-weight:700; padding:9px; border-radius:11px; color:#fff;}

.msg{padding:11px 14px; border-radius:14px; font-weight:700; font-size:13px; margin-bottom:12px; text-align:center;}
.msg-ok{background:#E8F8EC; color:var(--verde-s); border:2px solid var(--verde);}
.msg-err{background:#FDE8F0; color:var(--rosa-s); border:2px solid var(--rosa);}
</style>
</head>

          <button class="btn btn-turquesa" style="width:100%;" onclick="crearPersona()"><i class="ti ti-plus"></i> Agregar persona</button>
        </div>
        <div class="card">
          <h2><i class="ti ti-users"></i> Mis personas</h2>
          <div id="lista-personas"><p style="color:var(--gris);">Cargando…</p></div>
        </div>
      </div>

      <!-- EL RING (POMODORO) -->
      <div class="seccion" id="sec4">
        <div class="ring-pomo">
          <div class="pomo-inner">
            <div style="text-align:left; margin-bottom:12px;">
              <label style="color:var(--naranja-o);">Elige la tarea</label>
              <select id="pomo-tarea-sel"><option value="">— selecciona —</option></select>
            </div>
            <div class="pomo-time" id="pomo-time">25:00</div>
            <div id="pomo-controles">
              <button class="btn btn-naranja" style="width:100%;" onclick="pomoIniciar()"><i class="ti ti-player-play"></i> Iniciar pomodoro</button>
            </div>
            <div id="pomo-final" class="oculto" style="margin-top:14px; padding-top:12px; border-top:2px dashed #E8D5C0;">
              <div style="font-size:12px; color:var(--gris); margin-bottom:8px;">¿Cómo queda la tarea?</div>
              <div class="estados-grid">
                <button class="est-btn" style="background:var(--rosa);" onclick="pomoEstado('Pendiente')">Pendiente</button>
                <button class="est-btn" style="background:var(--turquesa);" onclick="pomoEstado('En Progreso')">En progreso</button>
                <button class="est-btn" style="background:var(--verde);" onclick="pomoEstado('Completada')">Completada</button>
                <button class="est-btn" style="background:var(--sol); color:var(--sol-s);" onclick="pomoEstado('En Pausa')">En pausa</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyoay-kjh3E8MVOHcTiPkApBXtN-8EXCSkQBY3GaD-FxEhQEGmHbQAmElOOuCWA2lYAIg/exec";
const SESION_HORAS = 12;

let TOKEN=null, TAREAS=[], chEstado=null, chPersona=null, seccionActual=0;
const posTop=[0,66,132,198,264];

async function api(action, extra={}){
  const body = Object.assign({action, token:TOKEN}, extra);
  const res = await fetch(API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(body)});
  return res.json();
}

/* ===== SESIÓN (12h) ===== */
function guardarSesion(token){
  const exp = Date.now() + SESION_HORAS*3600*1000;
  try{ localStorage.setItem("elfede_sesion", JSON.stringify({token, exp, sec:seccionActual})); }catch(e){}
}
function leerSesion(){
  try{
    const s = JSON.parse(localStorage.getItem("elfede_sesion"));
    if(s && s.exp > Date.now()) return s;
  }catch(e){}
  return null;
}
function borrarSesion(){ try{ localStorage.removeItem("elfede_sesion"); }catch(e){} }
function guardarSeccion(){
  try{
    const s = JSON.parse(localStorage.getItem("elfede_sesion"));
    if(s){ s.sec=seccionActual; localStorage.setItem("elfede_sesion", JSON.stringify(s)); }
  }catch(e){}
}

/* ===== LOGIN ===== */
async function login(){
  const usuario=document.getElementById("in-usuario").value.trim();
  const password=document.getElementById("in-password").value.trim();
  const msg=document.getElementById("login-msg");
  msg.innerHTML="";
  if(!usuario||!password){ msg.innerHTML='<div class="msg msg-err">Escribe usuario y contraseña</div>'; return; }
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"login",usuario,password})});
    const data=await res.json();
    if(data.ok){ TOKEN=data.token; guardarSesion(TOKEN); entrar(); }
    else msg.innerHTML='<div class="msg msg-err">'+(data.error||"No se pudo entrar")+'</div>';
  }catch(e){ msg.innerHTML='<div class="msg msg-err">Error de conexión. Revisa la URL del script.</div>'; }
}
function entrar(){
  document.getElementById("login").classList.add("oculto");
  document.getElementById("app").classList.remove("oculto");
  cargarTodo();
}
function logout(){
  TOKEN=null; borrarSesion();
  document.getElementById("app").classList.add("oculto");
  document.getElementById("login").classList.remove("oculto");
  document.getElementById("in-password").value="";
}

/* ===== NAVEGACIÓN ===== */
function irA(i){
  seccionActual=i;
  document.getElementById("fede-avatar").style.top=posTop[i]+"px";
  for(let k=0;k<5;k++){
    document.getElementById("sec"+k).classList.toggle("activa", k===i);
    document.getElementById("dot"+k).classList.toggle("activa", k===i);
  }
  guardarSeccion();
}

/* ===== CARGA ===== */
async function cargarTodo(){ await cargarPersonas(); await cargarTareas(); await cargarDashboard(); }

async function cargarPersonas(){
  const data=await api("listarPersonas");
  if(!data.ok) return;
  const selT=document.getElementById("t-persona");
  selT.innerHTML='<option value="-">—</option>';
  data.personas.forEach(p=>{ const o=document.createElement("option"); o.value=p.nombre; o.textContent=p.nombre; selT.appendChild(o); });
  const cont=document.getElementById("lista-personas");
  if(data.personas.length===0){ cont.innerHTML='<p style="color:var(--gris);">Aún no tienes personas.</p>'; return; }
  cont.innerHTML="";
  data.personas.forEach(p=>{
    const div=document.createElement("div"); div.className="persona-row";
    div.innerHTML='<div class="pnom">'+p.nombre+'</div><span class="persona-tipo">'+(p.tipo||"Otro")+'</span>'+
      '<button class="icon-btn ib-rosa" onclick="eliminarPersona(\''+p.nombre.replace(/'/g,"")+'\')"><i class="ti ti-trash"></i></button>';
    cont.appendChild(div);
  });
}

async function cargarTareas(){
  const data=await api("listarTareas");
  const cont=document.getElementById("lista-tareas");
  const selP=document.getElementById("pomo-tarea-sel");
  if(!data.ok){ cont.innerHTML='<p style="color:var(--gris);">No se pudieron cargar.</p>'; return; }
  TAREAS=data.tareas;
  selP.innerHTML='<option value="">— selecciona —</option>';
  TAREAS.forEach(t=>{ if(t.situacion!=="Completada"){ const o=document.createElement("option"); o.value=t.fila; o.textContent=t.descripcion+(t.persona&&t.persona!=="-"?" · "+t.persona:""); selP.appendChild(o);} });
  if(TAREAS.length===0){ cont.innerHTML='<p style="color:var(--gris);">Aún no tienes tareas. ¡Agrega la primera!</p>'; return; }
  cont.innerHTML="";
  TAREAS.forEach(t=>{
    const div=document.createElement("div"); div.className="tarea";
    let pill="";
    if(t.situacion==="VENCIDA")pill='<span class="pill pill-venc">Vencida</span>';
    else if(t.situacion==="HOY")pill='<span class="pill pill-hoy">Hoy</span>';
    else if(t.situacion==="Completada")pill='<span class="pill pill-comp">Completada</span>';
    else if(t.situacion==="En tiempo")pill='<span class="pill pill-tiempo">En tiempo</span>';
    const urg=t.urgente==="Sí"?'<span class="pill pill-urg">Urgente</span>':'';
    const persona=(t.persona&&t.persona!=="-")?'<span><i class="ti ti-user"></i> '+t.persona+'</span>':'';
    const venc=t.vencimiento?'<span><i class="ti ti-calendar"></i> '+t.vencimiento+'</span>':'';
    const pom=t.pomodoros?'<span><i class="ti ti-clock"></i> '+t.pomodoros+'</span>':'';
    div.innerHTML='<div class="desc">'+t.descripcion+'</div><div class="meta">'+pill+urg+persona+venc+pom+'</div>'+
      '<div class="acciones">'+
      (t.situacion!=="Completada"?'<button class="icon-btn ib-verde" onclick="completar('+t.fila+')"><i class="ti ti-check"></i></button>':'')+
      '<button class="icon-btn ib-rosa" onclick="eliminar('+t.fila+')"><i class="ti ti-trash"></i></button>'+
      '</div>';
    cont.appendChild(div);
  });
}

async function cargarDashboard(){
  const data=await api("dashboard");
  if(!data.ok) return;
  const d=data.data;
  const kpis=[["Total",d.total,"var(--morado)"],["Pendientes",d.pendientes,"var(--rosa)"],["En progreso",d.enProgreso,"var(--turquesa)"],["Completadas",d.completadas,"var(--verde)"],["Urgentes",d.urgentes,"var(--naranja)"],["Vencidas",d.vencidas,"var(--rosa-s)"]];
  document.getElementById("kpis").innerHTML=kpis.map(k=>'<div class="kpi"><div class="num" style="color:'+k[2]+'">'+k[1]+'</div><div class="lab">'+k[0]+'</div></div>').join("");
  const est=d.porEstado;
  if(chEstado)chEstado.destroy();
  chEstado=new Chart(document.getElementById("chEstado"),{type:"doughnut",data:{labels:["Pendiente","En Progreso","Completada","En Pausa"],datasets:[{data:[est["Pendiente"],est["En Progreso"],est["Completada"],est["En Pausa"]],backgroundColor:["#E84C88","#45B8AC","#6BCB77","#FFD166"],borderWidth:3,borderColor:"#fff"}]},options:{plugins:{legend:{position:"bottom",labels:{font:{size:10}}}}}});
  const rank=d.ranking||[];
  if(chPersona)chPersona.destroy();
  chPersona=new Chart(document.getElementById("chPersona"),{type:"bar",data:{labels:rank.map(r=>r.persona),datasets:[{data:rank.map(r=>r.abiertas),backgroundColor:"#7B3FA0",borderRadius:8}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

/* ===== CRUD TAREAS ===== */
async function crearTarea(){
  const desc=document.getElementById("t-desc").value.trim();
  if(!desc){ appMsg("Escribe una descripción","err"); return; }
  const res=await api("crearTarea",{descripcion:desc,vencimiento:document.getElementById("t-venc").value,persona:document.getElementById("t-persona").value,metodologia:document.getElementById("t-metodo").value,energia:document.getElementById("t-energia").value,estado:document.getElementById("t-estado").value,urgente:document.getElementById("t-urgente").value});
  if(res.ok){ appMsg("¡Tarea agregada!","ok"); document.getElementById("t-desc").value=""; document.getElementById("t-venc").value=""; cargarTareas(); cargarDashboard(); }
  else appMsg(res.error||"No se pudo crear","err");
}
async function completar(fila){ const res=await api("completarTarea",{fila}); if(res.ok){ cargarTareas(); cargarDashboard(); } }
async function eliminar(fila){ if(!confirm("¿Eliminar esta tarea?"))return; const res=await api("eliminarTarea",{fila}); if(res.ok){ appMsg("Tarea eliminada","ok"); cargarTareas(); cargarDashboard(); } }

/* ===== CRUD PERSONAS ===== */
async function crearPersona(){
  const nombre=document.getElementById("p-nombre").value.trim();
  if(!nombre){ appMsg("Escribe un nombre","err"); return; }
  const res=await api("crearPersona",{nombre,tipo:document.getElementById("p-tipo").value,email:document.getElementById("p-email").value,telefono:document.getElementById("p-telefono").value,empresa:document.getElementById("p-empresa").value});
  if(res.ok){ appMsg("¡Persona agregada!","ok"); ["p-nombre","p-email","p-telefono","p-empresa"].forEach(id=>document.getElementById(id).value=""); cargarPersonas(); }
  else appMsg(res.error||"No se pudo crear","err");
}
async function eliminarPersona(nombre){ if(!confirm("¿Eliminar a "+nombre+"?"))return; const res=await api("eliminarPersona",{nombre}); if(res.ok){ appMsg("Persona eliminada","ok"); cargarPersonas(); } }

function appMsg(txt,tipo){ const c=document.getElementById("app-msg"); c.innerHTML='<div class="msg msg-'+tipo+'">'+txt+'</div>'; setTimeout(()=>{c.innerHTML="";},2500); }

/* ===== POMODORO ===== */
let pomoFila=null, pomoSeg=25*60, pomoInt=null;
function pomoIniciar(){
  const sel=document.getElementById("pomo-tarea-sel");
  if(!sel.value){ appMsg("Elige una tarea primero","err"); return; }
  pomoFila=sel.value; pomoSeg=25*60; pomoPintar();
  document.getElementById("pomo-controles").innerHTML='<button class="btn btn-naranja" style="width:100%;" onclick="pomoPausar()"><i class="ti ti-player-pause"></i> Pausar</button>';
  clearInterval(pomoInt);
  pomoInt=setInterval(()=>{ pomoSeg--; pomoPintar(); if(pomoSeg<=0)pomoTerminar(); },1000);
}
function pomoPintar(){ const m=String(Math.floor(pomoSeg/60)).padStart(2,"0"); const s=String(pomoSeg%60).padStart(2,"0"); document.getElementById("pomo-time").textContent=m+":"+s; }
let pomoPausado=false;
function pomoPausar(){
  if(!pomoPausado){ clearInterval(pomoInt); pomoPausado=true; document.getElementById("pomo-controles").innerHTML='<button class="btn btn-naranja" style="width:100%;" onclick="pomoPausar()"><i class="ti ti-player-play"></i> Seguir</button>'; }
  else{ pomoPausado=false; document.getElementById("pomo-controles").innerHTML='<button class="btn btn-naranja" style="width:100%;" onclick="pomoPausar()"><i class="ti ti-player-pause"></i> Pausar</button>'; pomoInt=setInterval(()=>{ pomoSeg--; pomoPintar(); if(pomoSeg<=0)pomoTerminar(); },1000); }
}
async function pomoTerminar(){
  clearInterval(pomoInt);
  try{ new Audio("beep.mp3").play(); }catch(e){}
  if(pomoFila) await api("sumarPomodoro",{fila:pomoFila,cantidad:1,duracion:25});
  document.getElementById("pomo-controles").innerHTML='<div style="font-weight:700;color:var(--verde-s);">¡Pomodoro completado! 💪</div>';
  document.getElementById("pomo-final").classList.remove("oculto");
  cargarTareas(); cargarDashboard();
}
async function pomoEstado(estado){
  if(pomoFila) await api("cambiarEstado",{fila:pomoFila,estado});
  appMsg("Tarea marcada como "+estado,"ok");
  document.getElementById("pomo-final").classList.add("oculto");
  document.getElementById("pomo-controles").innerHTML='<button class="btn btn-naranja" style="width:100%;" onclick="pomoIniciar()"><i class="ti ti-player-play"></i> Iniciar pomodoro</button>';
  document.getElementById("pomo-time").textContent="25:00";
  pomoFila=null; cargarTareas(); cargarDashboard();
}

/* ===== ARRANQUE: revisa sesión guardada ===== */
window.addEventListener("load", ()=>{
  const s=leerSesion();
  if(s){ TOKEN=s.token; entrar(); if(typeof s.sec==="number"){ setTimeout(()=>irA(s.sec), 100); } }
});
</script>
</body>
</html>
