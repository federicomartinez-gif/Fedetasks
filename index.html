<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7B3FA0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>El Fede · Tu ring de productividad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --morado:#7B3FA0; --morado-o:#5E2E7D; --morado-s:#431F5A;
  --naranja:#FF7A3D; --naranja-o:#D85A20; --naranja-s:#A84214;
  --rosa:#E84C88; --rosa-o:#C43068; --rosa-s:#97244F;
  --turquesa:#45B8AC; --turquesa-o:#2E8B82; --turquesa-s:#1F6159;
  --sol:#FFD166; --sol-o:#E0A93C; --sol-s:#B8862A;
  --verde:#6BCB77; --verde-o:#4EA95A; --verde-s:#357A3F;
  --cielo:#A8D8EA; --cielo-soft:#DCF0F8;
  --texto:#3A2249; --gris:#8A7C93; --papel:#F5EFFA;
  --fondo-menu:#F0EAF6;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--papel); color:var(--texto); min-height:100vh; overflow-x:hidden;}
.oculto{display:none !important;}
.btn{border:none; cursor:pointer; font-weight:700; font-size:16px; color:#fff; padding:15px 24px; border-radius:16px; transition:transform .08s,box-shadow .08s; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px;}
.btn:active{transform:translateY(4px);}
.btn-morado{background:var(--morado); border:3px solid var(--morado-o); box-shadow:0 6px 0 var(--morado-s);}
.btn-morado:active{box-shadow:0 2px 0 var(--morado-s);}
.btn-naranja{background:var(--naranja); border:3px solid var(--naranja-o); box-shadow:0 6px 0 var(--naranja-s);}
.btn-naranja:active{box-shadow:0 2px 0 var(--naranja-s);}
.btn-turquesa{background:var(--turquesa); border:3px solid var(--turquesa-o); box-shadow:0 6px 0 var(--turquesa-s);}
.btn-turquesa:active{box-shadow:0 2px 0 var(--turquesa-s);}
.btn-verde{background:var(--verde); border:3px solid var(--verde-o); box-shadow:0 6px 0 var(--verde-s);}
.btn-verde:active{box-shadow:0 2px 0 var(--verde-s);}
.btn-rosa{background:var(--rosa); border:3px solid var(--rosa-o); box-shadow:0 6px 0 var(--rosa-s);}
.btn-rosa:active{box-shadow:0 2px 0 var(--rosa-s);}
input,select,textarea{font-family:inherit; font-size:16px; color:var(--texto); padding:14px 16px; border-radius:14px; border:3px solid var(--cielo); background:#fff; width:100%; outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--morado);}
label{font-size:14px; font-weight:700; color:var(--morado); display:block; margin-bottom:8px;}

/* LOGIN */
#login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:14px; background:var(--papel);}
.ring{background:#241A2E; border-radius:28px; padding:26px; border:6px solid #15101C; position:relative; width:100%; max-width:440px;}
.ring::before,.ring::after{content:""; position:absolute; left:22px; right:22px; height:5px; background:var(--naranja); border-radius:3px;}
.ring::before{top:14px; box-shadow:0 9px 0 var(--naranja),0 18px 0 var(--naranja);}
.ring::after{bottom:14px; box-shadow:0 -9px 0 var(--naranja),0 -18px 0 var(--naranja);}
.ring-lado{position:absolute; top:22px; bottom:22px; width:5px; background:var(--naranja); border-radius:3px;}
.ring-lado.izq{left:14px; box-shadow:9px 0 0 var(--naranja),18px 0 0 var(--naranja);}
.ring-lado.der{right:14px; box-shadow:-9px 0 0 var(--naranja),-18px 0 0 var(--naranja);}
.poste{position:absolute; width:16px; height:16px; border-radius:50%; background:#8A7C93; border:3px solid #5F5464;}
.poste.tl{top:9px;left:9px;} .poste.tr{top:9px;right:9px;} .poste.bl{bottom:9px;left:9px;} .poste.br{bottom:9px;right:9px;}
.login-inner{background:var(--papel); border-radius:20px; padding:34px 26px; text-align:center; margin:26px 12px; border:3px solid var(--morado); box-shadow:0 7px 0 var(--morado-s); position:relative; z-index:2;}
.login-logo{width:270px; height:270px; max-width:78vw; max-height:78vw; margin:0 auto 10px;}
.login-logo img{width:100%; height:100%; object-fit:contain;}
.login-frase{font-size:26px; font-weight:800; color:var(--morado); line-height:1.25; margin-bottom:22px;}
.login-frase .ring-w{color:var(--naranja);}

/* MENÚ */
#menu{min-height:100vh; background:var(--fondo-menu); max-width:520px; margin:0 auto; position:relative; transition:background .4s;}
.menu-top{position:sticky; top:0; z-index:30; background:var(--morado); box-shadow:0 4px 0 var(--morado-s); padding:12px 16px; display:flex; align-items:center; gap:10px;}
.menu-top .mlogo{width:42px;height:42px;flex-shrink:0;}
.menu-top .mlogo img{width:100%;height:100%;object-fit:contain;}
.menu-top h1{color:#fff;font-size:18px;}
.menu-top p{color:var(--cielo-soft);font-size:10px;}
.menu-top .acciones-top{margin-left:auto; display:flex; gap:8px;}
.top-ib{border:none;cursor:pointer;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.2);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;}

.menu-layout{display:flex; gap:10px; padding:12px 10px 60px;}
.nav-izq{position:sticky; top:70px; align-self:flex-start; width:64px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; z-index:20;}
.nav-btn{border:none; cursor:pointer; border-radius:16px; padding:10px 4px; display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; font-size:10px; font-weight:700; transition:transform .1s;}
.nav-btn:active{transform:scale(.92);}
.nav-btn i{font-size:22px;}

.zonas{flex:1; min-width:0;}
.zona{margin-bottom:26px; scroll-margin-top:70px;}
.zona-titulo{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; color:#fff; padding:8px 16px; border-radius:14px; margin-bottom:14px;}

/* paradas (acciones): cuadrícula de íconos que abren pantalla */
.paradas-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
.parada{cursor:pointer; background:rgba(255,255,255,.85); border-radius:18px; padding:14px 8px; text-align:center; border:3px solid transparent; transition:transform .1s;}
.parada:active{transform:scale(.95);}
.parada-dot{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;border:3px solid;margin:0 auto 8px;position:relative;}
.parada-nom{font-size:12px;font-weight:700;color:var(--texto);}
.parada-badge{position:absolute;top:-6px;right:-6px;background:#fff;color:var(--texto);font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--cielo);}

/* listas de filtros inline con cuerda */
.filtro-item{cursor:pointer; display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.9); border-radius:16px; padding:14px; margin-bottom:14px; border:3px solid transparent; transition:transform .1s; position:relative;}
.filtro-item:active{transform:scale(.97);}
.filtro-ico{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;border:3px solid;flex-shrink:0;}
.filtro-info{flex:1;}
.filtro-nom{font-size:15px;font-weight:700;color:var(--texto);}
.filtro-cont{font-size:12px;color:var(--gris);}
.cuerda{height:22px; width:4px; margin:-8px 0 -8px 34px; background:repeating-linear-gradient(180deg,var(--naranja) 0,var(--naranja) 6px,transparent 6px,transparent 11px); position:relative; z-index:0;}

/* PANTALLA SECCIÓN */
.pantalla{position:fixed; inset:0; z-index:40; background:var(--papel); max-width:520px; margin:0 auto; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s ease;}
.pantalla.activa{transform:translateX(0);}
.pantalla-top{padding:14px 16px; display:flex; align-items:center; gap:12px; color:#fff; flex-shrink:0;}
.pantalla-top .volver{border:none;cursor:pointer;background:rgba(255,255,255,.25);color:#fff;width:42px;height:42px;border-radius:13px;font-size:20px;display:flex;align-items:center;justify-content:center;}
.pantalla-top .plogo{width:40px;height:40px;margin-left:auto;}
.pantalla-top .plogo img{width:100%;height:100%;object-fit:contain;}
.pantalla-top h2{font-size:19px;flex:1;}
.pantalla-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
#giro-central{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;pointer-events:none;background:rgba(245,239,250,0);opacity:0;transition:opacity .15s;}
#giro-central.show{opacity:1;}
#giro-central img{width:130px;height:130px;object-fit:contain;animation:giroCentral 1.5s ease;}
@keyframes giroCentral{0%{transform:rotate(0) scale(.4);opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{transform:rotate(720deg) scale(1);opacity:0;}}

.card{background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;border:3px solid var(--cielo);box-shadow:0 6px 0 var(--cielo-soft);}
.card h3{font-size:16px;color:var(--morado);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.kpi{cursor:pointer;background:#fff;border-radius:16px;padding:14px;border:3px solid var(--cielo);box-shadow:0 5px 0 var(--cielo-soft);text-align:center;transition:transform .1s;}
.kpi:active{transform:scale(.95);}
.kpi .num{font-size:28px;font-weight:700;}
.kpi .lab{font-size:11px;color:var(--gris);font-weight:700;}
.chart-box{background:var(--papel);border-radius:16px;padding:14px;margin-bottom:14px;border:3px solid var(--cielo-soft);}
.chart-box h4{font-size:13px;color:var(--morado);margin-bottom:8px;text-align:center;}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:16px;}
.tarea{background:var(--papel);border-radius:14px;padding:12px;margin-bottom:10px;border:3px solid var(--cielo-soft);}
.tarea .desc{font-weight:700;margin-bottom:6px;}
.tarea .meta{font-size:11px;color:var(--gris);display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.pill{padding:3px 9px;border-radius:9px;font-size:10px;font-weight:700;color:#fff;}
.pill-venc{background:var(--rosa);}.pill-hoy{background:var(--sol);color:var(--sol-s);}
.pill-tiempo{background:var(--turquesa);}.pill-comp{background:var(--verde);}.pill-urg{background:var(--naranja);}
.acciones{display:flex;gap:6px;}
.icon-btn{border:none;cursor:pointer;width:36px;height:36px;border-radius:11px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;}
.ib-verde{background:var(--verde);box-shadow:0 3px 0 var(--verde-s);}
.ib-rosa{background:var(--rosa);box-shadow:0 3px 0 var(--rosa-s);}
.icon-btn:active{transform:translateY(2px);}
.persona-row{background:var(--papel);border-radius:14px;padding:12px;margin-bottom:10px;border:3px solid var(--cielo-soft);display:flex;align-items:center;gap:10px;}
.persona-row .pnom{font-weight:700;flex:1;}
.persona-tipo{font-size:10px;padding:3px 9px;border-radius:9px;font-weight:700;color:#fff;background:var(--turquesa);}
.vacio{color:var(--gris);text-align:center;padding:20px;font-size:14px;}
.proximamente{text-align:center;padding:30px 16px;}
.proximamente i{font-size:44px;color:var(--cielo);}

/* selector de fondo */
#fondo-panel{position:fixed;inset:0;z-index:50;background:rgba(36,26,46,.7);display:flex;align-items:flex-end;justify-content:center;padding:0;}
.fondo-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 34px;width:100%;max-width:520px;}
.fondo-sheet h3{font-size:17px;color:var(--morado);margin-bottom:16px;text-align:center;}
.fondos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fondo-op{cursor:pointer;border-radius:16px;height:70px;border:4px solid transparent;display:flex;align-items:flex-end;justify-content:center;padding:6px;font-size:11px;font-weight:700;color:var(--texto);}
.fondo-op.sel{border-color:var(--morado);}

/* ring pomodoro (base para entrega 3) */
.ring-pomo{background:#241A2E;border-radius:22px;padding:20px;border:5px solid #15101C;position:relative;margin-bottom:16px;}
.ring-pomo::before,.ring-pomo::after{content:"";position:absolute;left:16px;right:16px;height:3px;background:var(--naranja);border-radius:2px;}
.ring-pomo::before{top:9px;box-shadow:0 7px 0 var(--naranja);}
.ring-pomo::after{bottom:9px;box-shadow:0 -7px 0 var(--naranja);}
.pomo-inner{background:var(--papel);border-radius:16px;padding:20px;margin:22px 6px;border:3px solid var(--naranja);box-shadow:0 6px 0 var(--naranja-s);text-align:center;position:relative;z-index:2;}
.pomo-time{font-size:60px;font-weight:700;color:var(--naranja);margin:10px 0;}

/* ruleta */
#ruleta-overlay{position:fixed;inset:0;z-index:60;background:rgba(36,26,46,.88);display:flex;align-items:center;justify-content:center;padding:24px;}
.ruleta-card{background:var(--papel);border-radius:26px;padding:30px 24px;text-align:center;max-width:360px;width:100%;border:4px solid var(--morado);box-shadow:0 8px 0 var(--morado-s);}
.ruleta-logo{width:120px;height:120px;margin:0 auto 16px;}
.ruleta-logo img{width:100%;height:100%;object-fit:contain;}
.ruleta-girando{animation:girar 1.4s cubic-bezier(.3,0,.2,1);}
@keyframes girar{0%{transform:rotate(0);}100%{transform:rotate(1440deg);}}
.energia-btns{display:grid;gap:10px;margin-top:18px;}
.msg{padding:12px 15px;border-radius:14px;font-weight:700;font-size:14px;margin-bottom:12px;text-align:center;}
.msg-ok{background:#E8F8EC;color:var(--verde-s);border:2px solid var(--verde);}
.msg-err{background:#FDE8F0;color:var(--rosa-s);border:2px solid var(--rosa);}
</style>
</head>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyoay-kjh3E8MVOHcTiPkApBXtN-8EXCSkQBY3GaD-FxEhQEGmHbQAmElOOuCWA2lYAIg/exec";
const SESION_HORAS=12;
let TOKEN=null, TAREAS=[], PERSONAS=[], DASH=null;

const FONDOS={
  lavanda:{c:"#F0EAF6",n:"Lavanda"}, menta:{c:"#E4F5EE",n:"Menta"},
  crema:{c:"#FBF4E6",n:"Crema"}, cielo:{c:"#E4F2F8",n:"Cielo"},
  pasto:{c:"#E8F5DD",n:"Pasto"}, durazno:{c:"#FCEEE5",n:"Durazno"}
};

async function api(action, extra){
  const body=Object.assign({action, token:TOKEN}, extra||{});
  const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return res.json();
}
function guardarSesion(t){try{localStorage.setItem("elfede_s",JSON.stringify({token:t,exp:Date.now()+SESION_HORAS*3600*1000}));}catch(e){}}
function leerSesion(){try{const s=JSON.parse(localStorage.getItem("elfede_s"));if(s&&s.exp>Date.now())return s;}catch(e){}return null;}
function borrarSesion(){try{localStorage.removeItem("elfede_s");}catch(e){}}
function guardarFondo(k){try{localStorage.setItem("elfede_fondo",k);}catch(e){}}
function leerFondo(){try{return localStorage.getItem("elfede_fondo")||"lavanda";}catch(e){return "lavanda";}}

async function login(){
  initAudio();
  const u=document.getElementById("in-usuario").value.trim();
  const p=document.getElementById("in-password").value.trim();
  const msg=document.getElementById("login-msg"); msg.innerHTML="";
  if(!u||!p){msg.innerHTML='<div class="msg msg-err">Escribe usuario y contraseña</div>';return;}
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"login",usuario:u,password:p})});
    const data=await res.json();
    if(data.ok){TOKEN=data.token;guardarSesion(TOKEN);entrar(true);}
    else msg.innerHTML='<div class="msg msg-err">'+(data.error||"No se pudo entrar")+'</div>';
  }catch(e){msg.innerHTML='<div class="msg msg-err">Error de conexión. Revisa la URL del script.</div>';}
}
function entrar(conRuleta){
  document.getElementById("login").classList.add("oculto");
  document.getElementById("menu").classList.remove("oculto");
  aplicarFondo(leerFondo());
  cargarTodo().then(()=>{construirMenu(); if(conRuleta)mostrarRuleta();});
}
function logout(){TOKEN=null;borrarSesion();document.getElementById("menu").classList.add("oculto");document.getElementById("login").classList.remove("oculto");document.getElementById("in-password").value="";}

async function cargarTodo(){
  const [t,p,d]=await Promise.all([api("listarTareas"),api("listarPersonas"),api("dashboard")]);
  TAREAS=t.ok?t.tareas:[]; PERSONAS=p.ok?p.personas:[]; DASH=d.ok?d.data:null;
}

  {id:"f-prox",nom:"Próximas",ico:"ti-calendar-up",color:"var(--sol)",cs:"var(--sol-s)",filtro:()=>TAREAS.filter(t=>t.situacion==="En tiempo"||t.situacion==="HOY")}

function construirMenu(){
  const navIzq=document.getElementById("nav-izq");
  navIzq.innerHTML=GRUPOS.map(g=>'<button class="nav-btn" style="background:'+g.color+';box-shadow:0 4px 0 '+g.cs+';" onclick="irAGrupo(\''+g.id+'\')"><i class="ti '+g.ico+'"></i>'+g.nom+'</button>').join("");
  const zonas=document.getElementById("zonas");
  let h="";
  GRUPOS.forEach(g=>{
    h+='<div class="zona" id="'+g.id+'"><div class="zona-titulo" style="background:'+g.color+';"><i class="ti '+g.ico+'"></i> '+g.nom+'</div>';
    if(g.tipo==="acciones"){
      h+='<div class="paradas-grid">';
      g.items.forEach(s=>{ h+='<div class="parada" onclick="abrirSeccion(\''+s.id+'\')"><div class="parada-dot" style="background:'+s.color+';border-color:'+s.cs+';box-shadow:0 4px 0 '+s.cs+';"><i class="ti '+s.ico+'"></i></div><div class="parada-nom">'+s.nom+'</div></div>'; });
      h+='</div>';
    } else if(g.tipo==="filtros"){
      g.items.forEach((s,i)=>{
        const n=s.filtro().length;
        h+='<div class="filtro-item" onclick="abrirSeccion(\''+s.id+'\')"><div class="filtro-ico" style="background:'+s.color+';border-color:'+s.cs+';"><i class="ti '+s.ico+'"></i></div><div class="filtro-info"><div class="filtro-nom">'+s.nom+'</div><div class="filtro-cont">'+n+' tarea'+(n===1?"":"s")+'</div></div><i class="ti ti-chevron-right" style="color:var(--gris);"></i></div>';

      });
    } else if(g.tipo==="notas"){
      h+='<div class="proximamente"><i class="ti ti-note"></i><div style="color:var(--gris);margin-top:8px;">Tus notas llegan en la próxima actualización.</div></div>';
    }
    h+='</div>';
  });
  zonas.innerHTML=h;
}
function irAGrupo(gid){ beep(1); const el=document.getElementById(gid); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }

function abrirSeccion(id){
  beep(1);
  const s=TODAS_SEC.find(x=>x.id===id); if(!s)return;
  const top=document.getElementById("pantalla-top"); top.style.background=s.color;
  document.getElementById("pantalla-titulo").textContent=s.nom;
  mostrarGiroCentral();
  const body=document.getElementById("pantalla-body");
  if(id==="dashboard")body.innerHTML=vistaDashboard();
  else if(id==="nueva")body.innerHTML=vistaNueva();
  else if(id==="personas")body.innerHTML=vistaPersonas();
  else if(id==="ring")body.innerHTML=vistaRing();
  else if(id==="biblioteca")body.innerHTML=vistaBiblioteca();
  else {const arr=s.filtro?s.filtro():[]; body.innerHTML=vistaListaTareas(arr);}
  document.getElementById("pantalla").classList.add("activa");
  if(id==="dashboard")setTimeout(dibujarGraficosDashboard,60);
}
function volverMenu(){ beep(1); document.getElementById("pantalla").classList.remove("activa"); construirMenu(); }

function vistaListaTareas(arr){
  if(!arr.length)return '<div class="vacio">No hay tareas aquí.</div>';
  let h="";
  arr.forEach(t=>{
    let pill="";
    if(t.situacion==="VENCIDA")pill='<span class="pill pill-venc">Vencida</span>';
    else if(t.situacion==="HOY")pill='<span class="pill pill-hoy">Hoy</span>';
    else if(t.situacion==="Completada")pill='<span class="pill pill-comp">Completada</span>';
    else if(t.situacion==="En tiempo")pill='<span class="pill pill-tiempo">En tiempo</span>';
    const urg=t.urgente==="Sí"?'<span class="pill pill-urg">Urgente</span>':'';
    const per=(t.persona&&t.persona!=="-")?'<span><i class="ti ti-user"></i> '+t.persona+'</span>':'';
    const ven=t.vencimiento?'<span><i class="ti ti-calendar"></i> '+t.vencimiento+'</span>':'';
    h+='<div class="tarea"><div class="desc">'+t.descripcion+'</div><div class="meta">'+pill+urg+per+ven+'</div><div class="acciones">'+
       (t.situacion!=="Completada"?'<button class="icon-btn ib-verde" onclick="completar('+t.fila+')"><i class="ti ti-check"></i></button>':'')+
       '<button class="icon-btn ib-rosa" onclick="eliminar('+t.fila+')"><i class="ti ti-trash"></i></button></div></div>';
  });
  return h;
}
function vistaDashboard(){
  if(!DASH)return '<div class="vacio">Cargando…</div>';
  const d=DASH;
  const k=[["Total",d.total,"var(--morado)","f-total"],["Pendientes",d.pendientes,"var(--rosa)","f-pend"],["En progreso",d.enProgreso,"var(--turquesa)","f-prog"],["Completadas",d.completadas,"var(--verde)","f-comp"],["Urgentes",d.urgentes,"var(--naranja)","f-urg"],["Vencidas",d.vencidas,"var(--rosa-s)","f-venc"]];
  return '<div class="kpis">'+k.map(x=>'<div class="kpi" onclick="abrirSeccion(\''+x[3]+'\')"><div class="num" style="color:'+x[2]+'">'+x[1]+'</div><div class="lab">'+x[0]+'</div></div>').join("")+'</div>'+
    '<div class="chart-box"><h4>Tareas por estado</h4><canvas id="chEstado"></canvas></div>'+
    '<div class="chart-box"><h4>Pendientes por persona</h4><canvas id="chPersona"></canvas></div>';
}
function dibujarGraficosDashboard(){
  if(!DASH)return; const est=DASH.porEstado;
  const c1=document.getElementById("chEstado"); if(c1)new Chart(c1,{type:"doughnut",data:{labels:["Pendiente","En Progreso","Completada","En Pausa"],datasets:[{data:[est["Pendiente"],est["En Progreso"],est["Completada"],est["En Pausa"]],backgroundColor:["#E84C88","#45B8AC","#6BCB77","#FFD166"],borderWidth:3,borderColor:"#fff"}]},options:{plugins:{legend:{position:"bottom",labels:{font:{size:10}}}}}});
  const rank=DASH.ranking||[]; const c2=document.getElementById("chPersona");
  if(c2)new Chart(c2,{type:"bar",data:{labels:rank.map(r=>r.persona),datasets:[{data:rank.map(r=>r.abiertas),backgroundColor:"#7B3FA0",borderRadius:8}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

    '<div><label>Nivel de energía</label><select id="t-energia"><option value="">—</option><option>Alta</option><option>Media</option><option>Baja</option></select></div>'+

function vistaBiblioteca(){

async function crearTarea(){
  const desc=document.getElementById("t-desc").value.trim(); if(!desc){alert("Escribe una descripción");return;}
  const res=await api("crearTarea",{descripcion:desc,vencimiento:document.getElementById("t-venc").value,persona:document.getElementById("t-persona").value,metodologia:document.getElementById("t-metodo").value,energia:document.getElementById("t-energia").value,estado:document.getElementById("t-estado").value,urgente:document.getElementById("t-urgente").value});
  if(res.ok){await cargarTodo(); abrirSeccion("f-total");}else alert(res.error||"No se pudo crear");
}
async function completar(fila){const r=await api("completarTarea",{fila});if(r.ok){await cargarTodo();volverMenu();}}
async function eliminar(fila){if(!confirm("¿Eliminar esta tarea?"))return;const r=await api("eliminarTarea",{fila});if(r.ok){await cargarTodo();volverMenu();}}
async function crearPersona(){
  const nombre=document.getElementById("p-nombre").value.trim();if(!nombre){alert("Escribe un nombre");return;}
  const res=await api("crearPersona",{nombre,tipo:document.getElementById("p-tipo").value,email:document.getElementById("p-email").value,telefono:document.getElementById("p-telefono").value,empresa:document.getElementById("p-empresa").value});
  if(res.ok){await cargarTodo();abrirSeccion("personas");}else alert(res.error||"No se pudo crear");
}
async function eliminarPersona(nombre){if(!confirm("¿Eliminar a "+nombre+"?"))return;const r=await api("eliminarPersona",{nombre});if(r.ok){await cargarTodo();abrirSeccion("personas");}}


let _audioCtx=null, _sonidoActivo=false;
function initAudio(){
  if(_audioCtx){ if(_audioCtx.state==="suspended")_audioCtx.resume(); return; }
  try{ _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==="suspended")_audioCtx.resume(); }catch(e){}
}
function activarSonido(){
  initAudio();
  if(_audioCtx && _audioCtx.state==="suspended") _audioCtx.resume();
  _sonidoActivo=true;
  const b=document.getElementById("btn-sonido");
  if(b){ b.innerHTML='<i class="ti ti-volume"></i>'; b.style.background="rgba(107,203,119,.6)"; }
  beep(2);
}
function mostrarGiroCentral(){
  const g=document.getElementById("giro-central");
  const img=g.querySelector("img");
  img.style.animation="none"; void img.offsetWidth; img.style.animation="";
  g.classList.add("show");
  setTimeout(()=>{g.classList.remove("show");}, 1500);
}
function beep(veces){
  initAudio(); if(!_audioCtx)return;
  try{
    if(_audioCtx.state==="suspended")_audioCtx.resume();
    let t=_audioCtx.currentTime;
    for(let i=0;i<veces;i++){const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();o.connect(g);g.connect(_audioCtx.destination);o.frequency.value=660;o.type="sine";g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);o.start(t);o.stop(t+0.2);t+=0.24;}
  }catch(e){}
}

/* FONDO */
function abrirFondo(){
  const grid=document.getElementById("fondos-grid"); const actual=leerFondo();
  grid.innerHTML=Object.keys(FONDOS).map(k=>'<div class="fondo-op'+(k===actual?' sel':'')+'" style="background:'+FONDOS[k].c+';" onclick="elegirFondo(\''+k+'\')">'+FONDOS[k].n+'</div>').join("");
  document.getElementById("fondo-panel").classList.remove("oculto");
}
function cerrarFondo(){document.getElementById("fondo-panel").classList.add("oculto");}
function elegirFondo(k){guardarFondo(k);aplicarFondo(k);cerrarFondo();}
function aplicarFondo(k){document.getElementById("menu").style.background=FONDOS[k].c;}

  ov.classList.remove("oculto");btns.classList.add("oculto");txt.textContent="...";logo.classList.add("ruleta-girando");
  setTimeout(()=>{logo.classList.remove("ruleta-girando");txt.textContent="¿Cómo está tu nivel de energía, Fede?";btns.classList.remove("oculto");},1400);
}
function ruletaElegir(n){ruletaCerrar();const m={"Alta":"e-alta","Media":"e-media","Baja":"e-baja"};abrirSeccion(m[n]);}
function ruletaCerrar(){document.getElementById("ruleta-overlay").classList.add("oculto");}

window.addEventListener("load",()=>{
  document.addEventListener("touchstart",initAudio,{once:true});
  document.addEventListener("click",initAudio,{once:true});
  const s=leerSesion();if(s){TOKEN=s.token;entrar(true);}});
</script>
